<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Warehouse Stock Manager</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .field-error {
      display: block;
      font-size: 12px;
      color: #c0392b;
      margin-top: 3px;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Warehouse Stock Manager</h1>
  </header>
  <main>
    <div class="auth-box">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" oninput="validateEmail()" />
      <span class="field-error" id="emailErr"></span>
      <input type="password" id="password" placeholder="Password" oninput="validatePassword()" />
      <span class="field-error" id="passwordErr"></span>
      <button onclick="login()">Login</button>
      <p id="msg" style="color:red"></p>
      <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </main>
  <script>
    const API = 'https://warehouse-stock-manager.onrender.com';

    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    function validateEmail() {
      const val = document.getElementById('email').value.trim();
      const err = document.getElementById('emailErr');
      if (!val) { err.textContent = 'Email is required.'; return false; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { err.textContent = 'Enter a valid email address.'; return false; }
      err.textContent = '';
      return true;
    }

    function validatePassword() {
      const val = document.getElementById('password').value;
      const err = document.getElementById('passwordErr');
      if (!val) { err.textContent = 'Password is required.'; return false; }
      err.textContent = '';
      return true;
    }

    async function login() {
      if (!validateEmail() || !validatePassword()) return;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('name', data.name);
        window.location.href = 'index.html';
      } else {
        document.getElementById('msg').textContent = data.error;
      }
    }
  </script>
</body>
</html>

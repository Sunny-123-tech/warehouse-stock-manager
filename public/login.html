<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Warehouse Stock Manager</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .field-error {
      display: block;
      font-size: 12px;
      color: #c0392b;
      margin-top: 3px;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Warehouse Stock Manager</h1>
  </header>
  <main>
    <div class="auth-box">
      <h2>Login</h2>
      <input type="email" id="email" placeholder="Email" oninput="clearErr('emailErr')" />
      <span class="field-error" id="emailErr"></span>
      <input type="password" id="password" placeholder="Password" oninput="clearErr('passwordErr')" />
      <span class="field-error" id="passwordErr"></span>
      <button onclick="login()">Login</button>
      <p id="msg" style="color:red"></p>
      <p>Don't have an account? <a href="register.html">Register here</a></p>
    </div>
  </main>
  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'index.html';
    }

    function clearErr(id) {
      document.getElementById(id).textContent = '';
    }

    function validate() {
      let valid = true;
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email) {
        document.getElementById('emailErr').textContent = 'Email is required.';
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailErr').textContent = 'Enter a valid email address.';
        valid = false;
      }

      if (!password) {
        document.getElementById('passwordErr').textContent = 'Password is required.';
        valid = false;
      }

      return valid;
    }

    async function login() {
      if (!validate()) return;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (res.ok) {
        localStorage.setItem('token', data.token);
        localStorage.setItem('name', data.name);
        window.location.href = 'index.html';
      } else {
        document.getElementById('msg').textContent = data.error;
      }
    }
  </script>
</body>
</html>

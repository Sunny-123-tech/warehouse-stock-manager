<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Warehouse Stock Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Warehouse Stock Manager</h1>
    <nav>
      <a href="index.html">Dashboard</a>
      <a href="add.html">Add Item</a>
      <a href="stock.html">View Stock</a>
    </nav>
    <div class="header-right">
      <span id="username"></span>
      <button onclick="logout()">Logout</button>
    </div>
  </header>
  <main>
    <h2>Dashboard</h2>
    <p>Welcome to the Warehouse Stock Manager. Use the menu above to manage your stock.</p>
    <div class="stats-row">
      <div class="stat-box">
        <h3>Total Items</h3>
        <p id="totalItems">--</p>
      </div>
      <div class="stat-box">
        <h3>Total Quantity</h3>
        <p id="totalQty">--</p>
      </div>
      <div class="stat-box">
        <h3>Categories</h3>
        <p id="totalCategories">--</p>
      </div>
      <div class="stat-box low-stock">
        <h3>Low Stock (&lt; 5)</h3>
        <p id="lowStock">--</p>
      </div>
    </div>
    <h2>Recent Entries</h2>
    <table id="recentTable">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Category</th>
          <th>Quantity</th>
          <th>Location</th>
          <th>Added On</th>
        </tr>
      </thead>
      <tbody id="recentBody">
        <tr><td colspan="6">Loading...</td></tr>
      </tbody>
    </table>
  </main>
  <script>
    if (!localStorage.getItem('token')) {
      window.location.href = 'login.html';
    }

    const name = localStorage.getItem('name');
    if (name) document.getElementById('username').textContent = 'Welcome, ' + name;

    function logout() {
      localStorage.removeItem('token');
      localStorage.removeItem('name');
      window.location.href = 'login.html';
    }

    async function loadDashboard() {
      const token = localStorage.getItem('token');
      try {
        const res = await fetch('/api/stock', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (res.status === 401) {
          window.location.href = 'login.html';
          return;
        }

        const items = await res.json();

        document.getElementById('totalItems').textContent = items.length;
        const totalQty = items.reduce((sum, i) => sum + i.quantity, 0);
        document.getElementById('totalQty').textContent = totalQty;
        const cats = new Set(items.map(i => i.category));
        document.getElementById('totalCategories').textContent = cats.size;
        const low = items.filter(i => i.quantity < 5).length;
        document.getElementById('lowStock').textContent = low;

        const recent = [...items].slice(0, 5);
        const tbody = document.getElementById('recentBody');
        if (recent.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6">No items found. <a href="add.html">Add one</a></td></tr>';
          return;
        }
        tbody.innerHTML = recent.map(item => `
          <tr>
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.category}</td>
            <td>${item.quantity} ${item.unit}</td>
            <td>${item.location || '-'}</td>
            <td>${new Date(item.created_on).toLocaleDateString('en-IN')}</td>
          </tr>
        `).join('');
      } catch (err) {
        document.getElementById('recentBody').innerHTML =
          '<tr><td colspan="6">Error loading data. Is the server running?</td></tr>';
      }
    }

    loadDashboard();
  </script>
</body>
</html>

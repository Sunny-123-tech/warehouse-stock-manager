<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register - Warehouse Stock Manager</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .field-error {
      display: block;
      font-size: 12px;
      color: #c0392b;
      margin-top: 3px;
      min-height: 15px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Warehouse Stock Manager</h1>
  </header>
  <main>
    <div class="auth-box">
      <h2>Register</h2>
      <input type="text" id="name" placeholder="Full Name" oninput="validateName()" />
      <span class="field-error" id="nameErr"></span>
      <input type="email" id="email" placeholder="Email" oninput="validateEmail()" />
      <span class="field-error" id="emailErr"></span>
      <input type="password" id="password" placeholder="Password" oninput="validatePassword()" />
      <span class="field-error" id="passwordErr"></span>
      <button onclick="register()">Register</button>
      <p id="msg" style="color:red"></p>
      <p>Already have an account? <a href="login.html">Login here</a></p>
    </div>
  </main>
  <script>
    const API = 'https://warehouse-stock-manager.onrender.com';

    function validateName() {
      const val = document.getElementById('name').value.trim();
      const err = document.getElementById('nameErr');
      if (!val) { err.textContent = 'Full name is required.'; return false; }
      if (/\d/.test(val)) { err.textContent = 'Name cannot contain numbers.'; return false; }
      if (!/^[A-Za-z\s.\-']+$/.test(val)) { err.textContent = 'Name can only contain letters, spaces, or hyphens.'; return false; }
      if (val.length < 2) { err.textContent = 'Name must be at least 2 characters.'; return false; }
      err.textContent = '';
      return true;
    }

    function validateEmail() {
      const val = document.getElementById('email').value.trim();
      const err = document.getElementById('emailErr');
      if (!val) { err.textContent = 'Email is required.'; return false; }
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)) { err.textContent = 'Enter a valid email address.'; return false; }
      err.textContent = '';
      return true;
    }

    function validatePassword() {
      const val = document.getElementById('password').value;
      const err = document.getElementById('passwordErr');
      if (!val) { err.textContent = 'Password is required.'; return false; }
      if (val.length < 6) { err.textContent = 'Password must be at least 6 characters.'; return false; }
      err.textContent = '';
      return true;
    }

    async function register() {
      if (!validateName() || !validateEmail() || !validatePassword()) return;
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const res = await fetch(`${API}/api/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      });
      const data = await res.json();
      if (res.ok) {
        document.getElementById('msg').style.color = 'green';
        document.getElementById('msg').textContent = 'Registered! Redirecting to login...';
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else {
        document.getElementById('msg').textContent = data.error;
      }
    }
  </script>
</body>
</html>
